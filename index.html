<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridwan & Ahda Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<style>
body{margin:0;font-family:'Patrick Hand',cursive;background:#fff;color:#b30000;overflow-x:hidden}
section{padding:80px 20px;text-align:center}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.hero img{width:220px;border-radius:20px;opacity:0}
.hero h1,.hero h2{opacity:0}
.btn{margin-top:20px;padding:12px 25px;border:2px solid #b30000;background:none;color:#b30000;border-radius:30px}
.card{border:2px dashed #b30000;padding:20px;border-radius:20px;margin:20px}
.story{display:flex;flex-direction:column;gap:60px}
.story img{width:80%;max-width:350px;border:3px solid #b30000;border-radius:15px}
.swiper{width:90%}
.swiper-slide img{width:100%;border:3px solid #b30000;border-radius:15px}
.music-btn{position:fixed;bottom:20px;right:20px;background:#b30000;color:#fff;border:none;border-radius:50%;width:50px;height:50px}
</style>
</head>
<body>

<!-- HERO CINEMATIC -->
<section class="hero">
<img id="heroImg" src="foto1.jpg">
<h1 id="title">THESE KIDS ARE GETTING MARRIED</h1>
<h2 id="names">Ridwan & Ahda</h2>
<button class="btn" onclick="openInvite()">Open Invitation</button>
</section>

<section id="content" style="display:none;">

<!-- STORY MODE -->
<section class="story">
<div>
<img src="WhatsApp Image 2026-04-22 at 22.09.08.jpeg">
<p>Awal pertemuan yang sederhana</p>
</div>
<div>
<img src="WhatsApp Image 2026-04-22 at 22.09.09.jpeg">
<p>Bersama melewati waktu</p>
</div>
<div>
<img src="WhatsApp Image 2026-04-22 at 22.09.10.jpeg">
<p>Hingga akhirnya menuju satu tujuan</p>
</div>
<div>
<img src="WhatsApp Image 2026-04-22 at 22.09.12.jpeg">
<p>Dan kami memutuskan untuk bersama</p>
</div>
</section>

<!-- DETAIL -->
<section class="card">
<h2>2 Agustus 2026</h2>
<p>Akad 08.00 WIB | Resepsi 10.00 WIB</p>
<a href="https://share.google/IbJXOE1Nc0tVCDqgV">📍 Lokasi</a>
</section>

<!-- GALLERY SLIDER -->
<section>
<h2>Our Moments</h2>
<div class="swiper">
<div class="swiper-wrapper">
<div class="swiper-slide"><img src="WhatsApp Image 2026-04-22 at 22.09.08.jpeg"></div>
<div class="swiper-slide"><img src="WhatsApp Image 2026-04-22 at 22.09.09.jpeg"></div>
<div class="swiper-slide"><img src="WhatsApp Image 2026-04-22 at 22.09.10.jpeg"></div>
<div class="swiper-slide"><img src="WhatsApp Image 2026-04-22 at 22.09.12.jpeg"></div>
</div>
</div>
</section>

<!-- RSVP -->
<section class="card">
<h2>Reservation</h2>
<input id="name" placeholder="Nama">
<textarea id="message" placeholder="Ucapan"></textarea>
<button class="btn" onclick="submitReservation()">Submit Massage</button>
<div id="result"></div>
</section>

</section>

<button class="music-btn" onclick="toggleMusic()">🎵</button>
<audio id="music" loop>
<source src="https://youtu.be/loOpxRE6AmE?si=iUWW9eAolvUxa2NI">
</audio>

<script>
// HERO CINEMATIC
gsap.to("#heroImg",{opacity:1,scale:1.1,duration:1});
gsap.to("#title",{opacity:1,y:-20,duration:1,delay:0.5});
gsap.to("#names",{opacity:1,y:-10,duration:1,delay:1});

function openInvite(){
 document.querySelector('.hero').style.display='none';
 document.getElementById('content').style.display='block';
 document.getElementById('music').play();
}

function toggleMusic(){
 var m=document.getElementById('music');
 m.paused?m.play():m.pause();
}

// SWIPER
new Swiper('.swiper',{loop:true,autoplay:{delay:2000}});

// GOOGLE SHEET
const scriptURL="https://script.google.com/macros/s/AKfycbykxOXcpi9u4iCE3wkdD-TTviKvljDRSJBWp3vgVMtmdJTs_AJqrRXetdcG54hSvBY/exec";
function submitResrvation(){
 var name=document.getElementById('name').value;
 var msg=document.getElementById('message').value;
 fetch(scriptURL,{method:'POST',body:JSON.stringify({name:name,message:msg})})
 .then(()=>{
 document.getElementById('result').innerHTML+=`<p><b>${name}</b>: ${msg}</p>`;
 });
}
</script>

</body>
</html>
